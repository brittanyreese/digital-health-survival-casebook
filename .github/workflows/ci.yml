name: Reproducibility CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          version: "0.10.8"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies (incl. dev tools)
        run: uv sync --group dev

      - name: ruff check
        run: uv run ruff check .

      - name: pyright
        run: uv run pyright

      - name: pytest
        run: uv run pytest -q

  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          version: "0.10.8"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Generate synthetic data
        run: uv run cessation-generate

      - name: Validate synthetic data
        run: uv run cessation-validate

      - name: Run analysis pipeline
        run: |
          uv run python analysis/01_psychometrics.py
          uv run python analysis/02_segmentation.py
          uv run python analysis/04_outcome_duration.py
          uv run python analysis/06_sms_reengagement.py
          uv run python analysis/09_golden_paths.py
          uv run python analysis/10_churn_ml.py
          uv run python analysis/11_quit_anchored.py

      - name: Verify key result artifacts exist
        run: |
          test -f results/analysis/04_aft_weibull.csv
          test -f results/analysis/10_cv_aucs.csv
          test -f results/analysis/11_ph_test_primary.csv
          test -f results/analysis/11_robustness_window.csv
          test -f results/analysis/01_sdbs_cfa_fit.csv
          test -f results/analysis/06_reengagement_logit.csv
          echo "All key artifacts present"

      - name: Verify parameter recovery on freshly generated output
        # Runs the recovery tests against the results just produced by the
        # pipeline above (not the committed CSVs), so a change that breaks
        # recovery fails CI even if the committed artifacts are untouched.
        # Checks injected magnitudes (Weibull shape kappa, AFT effect band,
        # CFA fit), not only sign and significance.
        run: uv run pytest tests/test_parameter_recovery.py -q
